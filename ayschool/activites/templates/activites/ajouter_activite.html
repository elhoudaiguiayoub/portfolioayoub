{% extends 'authentification/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="premium-card p-4 p-md-5">
            <span class="eyebrow mb-3">Gestion professeur</span>
            <h1 class="h2 fw-bold mb-2">Ajouter une activité</h1>
            <p class="text-muted mb-4">Crée une activité avec une description claire, une date et une capacité maximale.</p>
            <form method="post" novalidate>
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary w-100 py-2">Publier l'activité</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}

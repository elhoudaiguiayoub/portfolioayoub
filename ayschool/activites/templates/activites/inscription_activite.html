{% extends 'authentification/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="premium-card p-4 p-md-5">
            <span class="eyebrow mb-3">Confirmation</span>
            <h1 class="h2 fw-bold mb-3">{{ activite.nom }}</h1>
            <p class="text-muted">{{ activite.description }}</p>
            <div class="row g-3 my-3">
                <div class="col-md-6"><div class="stat-card p-3"><small class="text-muted">Date</small><div class="fw-bold">{{ activite.date|date:"d M Y • H:i" }}</div></div></div>
                <div class="col-md-6"><div class="stat-card p-3"><small class="text-muted">Places max</small><div class="fw-bold">{{ activite.nombre_max_participants }}</div></div></div>
            </div>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-primary w-100 py-2">Confirmer mon inscription</button>
            </form>
            <a href="{% url 'liste_activites' %}" class="btn btn-link w-100 mt-2">Retour aux activités</a>
        </div>
    </div>
</div>
{% endblock %}

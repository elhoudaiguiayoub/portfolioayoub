{% extends 'authentification/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="premium-card p-4 p-md-5">
            <div class="d-flex align-items-center gap-3 mb-4">
                <div class="brand-mark fs-5">{{ username|first|upper }}</div>
                <div>
                    <h1 class="h3 fw-bold mb-0">{{ username }}</h1>
                    <p class="text-muted mb-0">Compte {{ role }}</p>
                </div>
            </div>
            <div class="row g-3">
                <div class="col-md-6"><div class="stat-card p-3"><small class="text-muted">Nom d'utilisateur</small><div class="fw-bold">{{ username }}</div></div></div>
                <div class="col-md-6"><div class="stat-card p-3"><small class="text-muted">Rôle</small><div class="fw-bold text-capitalize">{{ role }}</div></div></div>
            </div>
            <div class="d-flex flex-wrap gap-2 mt-4">
                <a href="{% url 'liste_activites' %}" class="btn btn-primary px-4">Voir les activités</a>
                <a href="{% url 'suivi' %}" class="btn btn-outline-primary px-4">Mon suivi</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

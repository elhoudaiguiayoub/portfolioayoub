{% extends 'authentification/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="premium-card p-4 p-md-5">
            <span class="eyebrow mb-3">Espace membre</span>
            <h1 class="h2 fw-bold mb-2">Connexion</h1>
            <p class="text-muted mb-4">Connecte-toi pour suivre tes inscriptions ou gérer les activités.</p>
            <form method="post" novalidate>
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary w-100 py-2">Se connecter</button>
            </form>
            <p class="text-center text-muted mt-4 mb-0">Pas encore de compte ? <a href="{% url 'inscription' %}">Créer un compte</a></p>
        </div>
    </div>
</div>
{% endblock %}

{% extends 'authentification/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="premium-card p-4 p-md-5">
            <span class="eyebrow mb-3">Nouveau compte</span>
            <h1 class="h2 fw-bold mb-2">Inscription</h1>
            <p class="text-muted mb-4">Crée un compte élève, professeur ou administrateur pour tester les rôles du projet.</p>
            <form method="post" novalidate>
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary w-100 py-2">Créer mon compte</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
